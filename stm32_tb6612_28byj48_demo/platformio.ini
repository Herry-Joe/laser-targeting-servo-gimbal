;=============================================================================
; PlatformIO 项目配置
; STM32F103C8T6 (Blue Pill) + TB6612 + 28BYJ-48 云台 Demo
; =============================================================================

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube

; ---- 串口监视 ----
monitor_speed = 115200

; ---- 烧录方式 (四选一) ----
; 1. ST-Link 烧录器 (推荐)
upload_protocol = stlink
; ST-Link 烧录复位策略
; - 不要写 `reset_config none`: 这会阻止 OpenOCD 在 init 连接阶段发 SRST 复位,
;   如果芯片正处于 SWD 引脚被禁用的状态 (如旧版 firmware 刚配成了 DISABLE),
;   OpenOCD 将完全无法连接 → "init mode failed (unable to connect to the target)"。
; - 使用 OpenOCD 0.12 脚本默认: `reset_config srst_nogate` (见 stm32f1x.cfg)。
;   ST-Link 走 HLA 模式, 连接时的复位由 HLA 管理: 
;     * NRST 已接 → SRST 硬件复位, 芯片回到默认 SWD 状态 → 连接成功
;     * NRST 未接 → SRST 无作用, 但芯片若已是 NOJTAG 固件 (SWD 不掉) 则正常连接
; - 烧录完成后 `program ... reset` 可能因 NRST 未接而报 "Error 1", 属假阳性,
;   固件已烧录成功, 忽略即可。新固件改用 NOJTAG (保留 SWD), 下次烧录不再依赖复位。 
; 
; 若仍遇到 "init mode failed", 请尝试:
;   ① 断开并重新插入 ST-Link USB (适配器可能需重枚举)
;   ② 按住 BluePill 复位按钮不放 → 点击烧录 → 看到 "Programming Started" 时松开

; 2. CMSIS-DAP (克隆 ST-Link 备选方案)
; upload_protocol = cmsis-dap

; 3. 串口 ISP 烧录 (USB-TTL, BOOT0=1, 不需要 ST-Link)
; upload_protocol = serial
; upload_port = COM3          ; 改成你的串口号

; 4. J-Link 烧录器
; upload_protocol = jlink
; debug_tool = jlink

; ---- 编译选项 ----
build_flags =
    -D STM32F103xB
    -D USE_HAL_DRIVER

; ---- 调试配置 ----
debug_tool = stlink
debug_init_break = tbreak main

; ---- 库依赖查找模式 ----
; deep+ : 递归搜索 include 和 lib 目录
lib_ldf_mode = deep+
